name: Publish Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: tauri-client/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: tauri-client
        run: npm ci

      - name: Build portable package
        shell: pwsh
        run: .\pack_release.ps1 -Build -Version "${{ github.ref_name }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "YsnTrans ${{ github.ref_name }}"
          files: "release/ScreenshotTranslator_Windows_${{ github.ref_name }}.zip"
          draft: false
          prerelease: false
          body: |
            ## YsnTrans ${{ github.ref_name }}

            ### 更新内容
            - 冻结商业级首帧确认计划，当前版本优先修复日常小功能和截图体验问题。
            - 系统设置中隐藏内部翻译服务地址、Token、家里内网地址等不应面向普通用户的配置。
            - 托盘右键菜单改为中文，并新增“延迟 3 秒截图”。
            - 新增图片保存设置：文件名前缀、时间格式、默认保存位置、记忆上次保存位置。
            - 默认保存文件名升级为秒级时间戳，例如 `Ysn_20260611_190405.png`，减少同一分钟内重名。
            - 修复 `Ctrl+S` 保存窗口按 `Esc` 后截图遮罩/窗口残留的问题。
            - 识别到 UI/窗口候选时，左键轻点即可选中候选区域，减少手动框选。
            - 设置页本地选项支持自动保存；恢复默认快捷键、清空快捷键会立即保存并重新注册。
            - 快捷键输入改为按键录入：点击输入框后直接按组合键，`Backspace`、`Delete` 或 `Esc` 可清空。

            ### 下载说明
            下载 `ScreenshotTranslator_Windows_${{ github.ref_name }}.zip`，解压后运行 `YSN-Screenshot-Translator/YsnTrans.exe`。

            ### 验证
            本次发布前已通过 Rust 检查、TypeScript 检查、i18n 检查、OCR processing 检查、前端生产构建和 `git diff --check`。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
