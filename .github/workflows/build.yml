name: Publish Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        name: "截图翻译 ${{ github.ref_name }}"
        body: |
          ## 截图翻译 ${{ github.ref_name }}

          ### 下载说明
          下载 `ScreenshotTranslator_Windows.zip` 解压后直接运行 `ScreenshotTranslator.exe`，无需安装。

          ### 包含内容
          - `ScreenshotTranslator.exe` — 主程序
          - Qt 运行时 DLL（已打包）
          - `ocr/PaddleOCR-json_v1.4.1/` — 本地 OCR 引擎（开箱即用）

          ### 配置
          首次运行后右键托盘图标 → 设置，填入服务端地址和 Token。
        draft: true
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
