name: Build and Package Client

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Qt (MSVC)
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.3'
        arch: 'win64_msvc2019_64'

    - name: Setup MSVC environment
      uses: ilammy/msvc-dev-cmd@v1

    - name: Configure CMake
      shell: pwsh
      run: |
        $qtDir = $env:QT_ROOT_DIR
        Write-Host "Qt dir: $qtDir"
        cmake -S client -B build -G Ninja `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_PREFIX_PATH="$qtDir"

    - name: Build Application
      shell: pwsh
      run: |
        cmake --build build --config Release

    - name: Prepare dist directory
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path dist
        Copy-Item release\ScreenshotTranslator.exe dist\

    - name: Deploy Qt DLLs (windeployqt)
      shell: pwsh
      run: |
        $qtDir = $env:QT_ROOT_DIR
        $windeployqt = "$qtDir\bin\windeployqt.exe"
        Write-Host "windeployqt path: $windeployqt"
        $env:PATH = "$qtDir\bin;$env:PATH"
        Push-Location dist
        & $windeployqt --release --no-translations `
          --no-system-d3d-compiler --no-opengl-sw `
          ScreenshotTranslator.exe
        Pop-Location

    - name: Download PaddleOCR-json
      shell: pwsh
      run: |
        $url = "https://github.com/hiroi-sora/PaddleOCR-json/releases/download/v1.4.1/PaddleOCR-json_v1.4.1_windows_x64.7z"
        Invoke-WebRequest -Uri $url -OutFile "PaddleOCR-json.7z" -TimeoutSec 120

    - name: Extract PaddleOCR-json
      shell: pwsh
      run: |
        $sevenZip = "C:\Program Files\7-Zip\7z.exe"
        New-Item -ItemType Directory -Force -Path dist\ocr
        & $sevenZip x PaddleOCR-json.7z "-odist\ocr" -y
        # Rename extracted folder to the expected name if needed
        $extracted = Get-ChildItem -Path dist\ocr -Directory | Select-Object -First 1
        if ($extracted -and $extracted.Name -ne "PaddleOCR-json_v1.4.1") {
            Rename-Item -Path $extracted.FullName -NewName "PaddleOCR-json_v1.4.1"
        }

    - name: Create Release Zip
      shell: pwsh
      run: |
        Compress-Archive -Path dist\* -DestinationPath ScreenshotTranslator_Windows.zip -Force

    - name: Upload Build Artifact (every push)
      uses: actions/upload-artifact@v4
      with:
        name: ScreenshotTranslator_Windows
        path: ScreenshotTranslator_Windows.zip
        retention-days: 7

    - name: Create GitHub Release (only on v* tags)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        name: "截图翻译 ${{ github.ref_name }}"
        body: |
          ## 截图翻译 ${{ github.ref_name }}

          ### 下载说明
          下载 `ScreenshotTranslator_Windows.zip` 解压后直接运行 `ScreenshotTranslator.exe`，无需安装。

          ### 包含内容
          - `ScreenshotTranslator.exe` — 主程序
          - Qt 运行时 DLL（已打包）
          - `ocr/PaddleOCR-json_v1.4.1/` — 本地 OCR 引擎（开箱即用）

          ### 配置
          首次运行后右键托盘图标 → 设置，填入服务端地址和 Token。
        files: ScreenshotTranslator_Windows.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
